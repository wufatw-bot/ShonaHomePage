<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Scholar | 私中入學菁英專班</title>
    <style>
        :root {
            --primary-color: #1a2a6c;
            --accent-color: #b21f1f;
            --text-color: #333;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            color: var(--text-color);
            background-color: #f4f4f4;
        }
        .header {
            background: linear-gradient(rgba(26, 42, 108, 0.8), rgba(26, 42, 108, 0.8)), url('Elite_scholar.png') center/cover;
            color: white;
            padding: 100px 20px;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: var(--primary-color);
            text-align: center;
        }
        .features {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin: 40px 0;
        }
        .feature-item {
            flex: 1;
            min-width: 250px;
            margin: 10px;
            padding: 20px;
            border-left: 5px solid var(--accent-color);
            background: #f9f9f9;
        }
        .iframe-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            margin-top: 30px;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 40px 20px;
            margin-top: 50px;
        }
        .cta-button {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Elite Scholar 菁英學子</h1>
        <p>專業輔導私中入學考試，開啟卓越學習之門</p>
    </header>

    <div class="container">
        <h2>課程核心特色</h2>
        <div class="features">
            <div class="feature-item">
                <h3>精準模考</h3>
                <p>獨家收錄各大私中（薇閣、延平、康橋等）歷屆考題與模擬試卷。</p>
            </div>
            <div class="feature-item">
                <h3>名師授課</h3>
                <p>超過十年經驗的資深導師，掌握命題趨勢與解題技巧。</p>
            </div>
            <div class="feature-item">
                <h3>全人輔導</h3>
                <p>除了學科，更包含智力測驗與口試應對培訓。</p>
            </div>
        </div>

    <div class="card" style="border-top-color: #3498db;">
        <h2>🖼️ 活動海報與行程預覽</h2>
        <div class="image-gallery">
            <div class="image-item">
                <img src="EliteScholar.png" alt="活動簡章說明">
                <div class="image-caption">活動簡章說明</div>
            </div>
            <div class="image-item">
                <img src="Figure2.png" alt="暑期活動日程表">
                <div class="image-caption">暑期活動日程表</div>
            </div>
        </div>
    </div>


        <hr>

        <h2>招生簡報與環境展示</h2>
        <div class="iframe-container">
            <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vSzp6BJrK0XmPKvDx8Cms6KKKcwydkbpx3lsyfGj7WSOHqQKXsDPsMAzDGZsE-YRg/pubembed?start=true&loop=true&delayms=3000" 
                    allowfullscreen="true" 
                    mozallowfullscreen="true" 
                    webkitallowfullscreen="true">
            </iframe>
        </div>

        <div style="text-align: center;">
            <a href="#" class="cta-button">立即預約試聽課程</a>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Elite Scholar 菁英私中班. 版權所有.</p>
        <p>地址：台北市教育路 123 號 | 電話：(02) 2345-6789</p>
    </footer>

</body>
</html>
