<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>畢馬龍效應｜反直覺互動問卷</title>
<style>
body{
  font-family: "Noto Sans TC", sans-serif;
  background:#0f172a;
  color:#e2e8f0;
  margin:0;
  padding:20px;
}
.container{
  max-width:800px;
  margin:auto;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}
button{
  background:#38bdf8;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  margin:5px;
}
button:hover{opacity:0.8;}
.option{
  background:#334155;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  cursor:pointer;
}
.option:hover{background:#475569;}
.progress{
  height:10px;
  background:#334155;
  border-radius:10px;
  overflow:hidden;
}
.progress-bar{
  height:10px;
  background:#22c55e;
  width:0%;
}
.feedback{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  display:none;
}
.correct{background:#14532d;}
.wrong{background:#7f1d1d;}
.toggle{
  margin-bottom:10px;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>🧠 畢馬龍效應｜反直覺問卷</h2>

<div class="toggle">
模式：
<button onclick="setMode('teacher')">教師模式</button>
<button onclick="setMode('manager')">主管模式</button>
</div>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<p id="question"></p>
<div id="options"></div>
<div id="feedback" class="feedback"></div>

<button onclick="next()">下一題</button>
</div>

<div class="card" id="result" style="display:none;">
<h3>📊 分析結果</h3>
<p id="analysis"></p>
</div>

</div>

<script>

let mode = "teacher";
let current = 0;
let score = 0;

function setMode(m){
  mode = m;
  current = 0;
  score = 0;
  document.getElementById("result").style.display="none";
  loadQuestion();
}

const questions = [
{
q_teacher:"老師被告知某些學生是『高潛力』，最可能發生什麼？",
q_manager:"主管被告知某些員工是『高潛力』，最可能發生什麼？",
options:[
"老師/主管會刻意給更多資源（有意識）",
"老師/主管不會改變行為",
"老師/主管會不自覺改變互動方式",
"只有學生/員工自己變好"
],
correct:2,
explain:"✔️ 關鍵在「無意識行為改變」，這才是畢馬龍效應核心"
},
{
q_teacher:"學生變好的主要原因是？",
q_manager:"員工變好的主要原因是？",
options:[
"原本就比較聰明",
"老師/主管的期待改變互動",
"考試變簡單",
"運氣好"
],
correct:1,
explain:"✔️ 不是能力，而是『被對待的方式改變』"
},
{
q_teacher:"哪一種行為最關鍵？",
q_manager:"哪一種領導行為最關鍵？",
options:[
"更多責罵",
"忽略差異",
"更正向回饋與機會",
"降低要求"
],
correct:2,
explain:"✔️ 氛圍＋回饋＋機會 是三大核心機制"
},
{
q_teacher:"為何低年級效果更明顯？",
q_manager:"為何新進員工效果更明顯？",
options:[
"能力較差",
"較容易受到期待影響",
"比較懶",
"比較聰明"
],
correct:1,
explain:"✔️ 自我概念尚未穩定 → 更容易被塑造"
},
{
q_teacher:"如果老師期待低，可能會？",
q_manager:"如果主管期待低，可能會？",
options:[
"沒有影響",
"表現變好",
"表現變差",
"只影響心情"
],
correct:2,
explain:"✔️ 這叫負向畢馬龍效應（Golem effect）"
}
];

function loadQuestion(){
  let q = questions[current];
  document.getElementById("question").innerText =
    mode==="teacher"?q.q_teacher:q.q_manager;

  let optHTML="";
  q.options.forEach((opt,i)=>{
    optHTML+=`<div class="option" onclick="select(${i})">${opt}</div>`;
  });
  document.getElementById("options").innerHTML=optHTML;
  document.getElementById("feedback").style.display="none";

  document.getElementById("bar").style.width =
    ((current)/questions.length)*100 + "%";
}

function select(i){
  let q = questions[current];
  let fb = document.getElementById("feedback");
  fb.style.display="block";

  if(i===q.correct){
    score++;
    fb.className="feedback correct";
    fb.innerHTML="✅ 正確<br>"+q.explain;
  }else{
    fb.className="feedback wrong";
    fb.innerHTML="❌ 再想想<br>"+q.explain;
  }
}

function next(){
  current++;
  if(current<questions.length){
    loadQuestion();
  }else{
    showResult();
  }
}

function showResult(){
  document.getElementById("question").innerText="";
  document.getElementById("options").innerHTML="";
  document.getElementById("feedback").style.display="none";

  document.getElementById("bar").style.width="100%";

  let text="";
  if(score>=4){
    text="🔥 你已經具備高階覺察：你知道『期待本身就是介入』";
  }else if(score>=2){
    text="⚡ 你正在轉變：開始理解『互動如何塑造表現』";
  }else{
    text="🌱 關鍵盲點：你可能低估了『期待的影響力』";
  }

  document.getElementById("analysis").innerText =
    "得分："+score+"/"+questions.length+"\n"+text;

  document.getElementById("result").style.display="block";
}

loadQuestion();

</script>

</body>
</html>
