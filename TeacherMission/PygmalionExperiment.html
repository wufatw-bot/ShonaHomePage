<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>畢馬龍效應互動體驗</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fa;
    padding: 20px;
}
.container {
    max-width: 850px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
}
h1 {
    text-align: center;
}
.question {
    margin-bottom: 25px;
}
.feedback {
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    display: none;
}
.low { background: #ffe5e5; }
.mid { background: #fff5cc; }
.high { background: #e6f7ff; }

.progress {
    height: 20px;
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}
.progress-bar {
    height: 100%;
    width: 0%;
    background: #4caf50;
}
.result {
    margin-top: 30px;
    padding: 20px;
    background: #eef6ff;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="container">

<h1>🔥 畢馬龍效應互動體驗</h1>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<form id="quiz">

<!-- Q1 -->
<div class="question">
<p>1️⃣ 當某人表現普通時，你會？</p>
<label><input type="radio" name="q1" value="1"> 維持基本資源</label><br>
<label><input type="radio" name="q1" value="2"> 先觀察</label><br>
<label><input type="radio" name="q1" value="3"> 減少互動</label><br>
<label><input type="radio" name="q1" value="4"> 刻意多關心</label>

<div class="feedback" id="f1"></div>
</div>

<!-- Q2 -->
<div class="question">
<p>2️⃣ 重要任務你通常給誰？</p>
<label><input type="radio" name="q2" value="1"> 穩定的人</label><br>
<label><input type="radio" name="q2" value="2"> 反應快的人</label><br>
<label><input type="radio" name="q2" value="3"> 潛力高的人</label><br>
<label><input type="radio" name="q2" value="4"> 隨機分配</label>

<div class="feedback" id="f2"></div>
</div>

<!-- Q3 -->
<div class="question">
<p>3️⃣ 當對方做錯時？</p>
<label><input type="radio" name="q3" value="1"> 直接給答案</label><br>
<label><input type="radio" name="q3" value="2"> 指出錯誤</label><br>
<label><input type="radio" name="q3" value="3"> 鼓勵再試</label><br>
<label><input type="radio" name="q3" value="4"> 拆解思路</label>

<div class="feedback" id="f3"></div>
</div>

<!-- Q4 -->
<div class="question">
<p>4️⃣ 面對不同人，你的語氣？</p>
<label><input type="radio" name="q4" value="1"> 覺得應該會</label><br>
<label><input type="radio" name="q4" value="2"> 鼓勵嘗試</label><br>
<label><input type="radio" name="q4" value="3"> 再教一次</label><br>
<label><input type="radio" name="q4" value="4"> 視人調整</label>

<div class="feedback" id="f4"></div>
</div>

<!-- Q5 -->
<div class="question">
<p>5️⃣ 長期沒進步的人？</p>
<label><input type="radio" name="q5" value="1"> 接受現狀</label><br>
<label><input type="radio" name="q5" value="2"> 降低標準</label><br>
<label><input type="radio" name="q5" value="3"> 減少投入</label><br>
<label><input type="radio" name="q5" value="4"> 改變策略</label>

<div class="feedback" id="f5"></div>
</div>

<button type="button" onclick="finalResult()">完成分析</button>

</form>

<div class="result" id="result"></div>

</div>

<script>

const feedbackData = {
1:[
"⚠️ 你正在『維持現狀』，期待沒有被提高（Input不足）",
"⚠️ 觀察本身可能是『低期待』的包裝",
"❗ 這會形成負向畢馬龍效應（互動減少）",
"✅ 高期待行為：主動投入更多心理資源（Climate↑）"
],
2:[
"⚠️ 機會集中在既有表現者（Output偏差）",
"⚠️ 快反應 ≠ 高潛力",
"⚠️ 你正在『預測成功者』",
"✅ 隨機化能打破期待偏差"
],
3:[
"⚠️ 只給答案會抑制能力發展",
"⚠️ 指錯不等於成長",
"🟡 有支持，但深度不足",
"✅ 高品質回饋（Feedback核心）"
],
4:[
"⚠️ 這句話其實帶有壓力",
"🟡 鼓勵但不一定真信任",
"🟡 支持但可能降低期待",
"❗ 視人調整＝潛在差別對待"
],
5:[
"❗ 固化心智模型",
"❗ 直接降低期待",
"❗ 投資撤退＝表現停滯",
"✅ 真正改變來自策略調整"
]
};

const form = document.getElementById('quiz');
const progressBar = document.getElementById('progressBar');

form.addEventListener('change', (e)=>{
    const name = e.target.name;
    const value = e.target.value;

    const feedbackBox = document.getElementById('f'+name.slice(1));
    feedbackBox.style.display = "block";
    feedbackBox.innerHTML = feedbackData[name.slice(1)][value-1];

    // progress
    let answered = 0;
    for(let i=1;i<=5;i++){
        if(form['q'+i].value) answered++;
    }
    progressBar.style.width = (answered/5)*100 + '%';
});

function finalResult(){
    let score = 0;
    for(let i=1;i<=5;i++){
        score += parseInt(form['q'+i].value || 0);
    }

    let text = "";

    if(score <= 10){
        text = "🔴 高風險：你可能正在無意間強化『負向畢馬龍效應』。期待低 → 投入少 → 表現下降。";
    } else if(score <= 15){
        text = "🟡 中等狀態：你有支持，但仍偏向維持現況，尚未主動創造成長環境。";
    } else {
        text = "🟢 高期待引導者：你正在透過行為塑造他人的成長與表現。";
    }

    document.getElementById('result').innerHTML =
        "<h3>你的整體分析：</h3><p>"+text+"</p><br>" +
        "<b>核心提醒：</b><br>" +
        "👉 你不是在評估能力，而是在創造能力";
}

</script>

</body>
</html>
