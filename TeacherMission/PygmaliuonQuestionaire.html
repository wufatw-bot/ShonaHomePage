
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>畢馬龍效應反直覺問卷</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    padding: 20px;
}
.container {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
}
h1 {
    text-align: center;
}
.question {
    margin-bottom: 20px;
}
button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
}
.progress {
    height: 20px;
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}
.progress-bar {
    height: 100%;
    width: 0%;
    background: #4caf50;
}
.result {
    margin-top: 30px;
    padding: 20px;
    background: #eef6ff;
    border-radius: 10px;
}
</style>
</head>

<body>
<div class="container">
<h1>🔥 畢馬龍效應反直覺問卷</h1>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<form id="quizForm">

<div class="question">
<p>1. 當某人表現普通時，你會：</p>
<label><input type="radio" name="q1" value="1"> 維持基本資源</label><br>
<label><input type="radio" name="q1" value="2"> 觀察等待</label><br>
<label><input type="radio" name="q1" value="3"> 減少互動</label><br>
<label><input type="radio" name="q1" value="4"> 刻意多關心</label>
</div>

<div class="question">
<p>2. 重要任務你通常給誰？</p>
<label><input type="radio" name="q2" value="1"> 表現穩定的人</label><br>
<label><input type="radio" name="q2" value="2"> 反應快的人</label><br>
<label><input type="radio" name="q2" value="3"> 潛力高的人</label><br>
<label><input type="radio" name="q2" value="4"> 隨機分配</label>
</div>

<div class="question">
<p>3. 當對方做錯時：</p>
<label><input type="radio" name="q3" value="1"> 直接給答案</label><br>
<label><input type="radio" name="q3" value="2"> 指出錯誤</label><br>
<label><input type="radio" name="q3" value="3"> 鼓勵再試</label><br>
<label><input type="radio" name="q3" value="4"> 拆解思路</label>
</div>

<div class="question">
<p>4. 你的語氣通常：</p>
<label><input type="radio" name="q4" value="1"> 覺得應該會</label><br>
<label><input type="radio" name="q4" value="2"> 鼓勵嘗試</label><br>
<label><input type="radio" name="q4" value="3"> 再教一次</label><br>
<label><input type="radio" name="q4" value="4"> 視人調整</label>
</div>

<div class="question">
<p>5. 長期沒進步的人：</p>
<label><input type="radio" name="q5" value="1"> 接受現狀</label><br>
<label><input type="radio" name="q5" value="2"> 降低標準</label><br>
<label><input type="radio" name="q5" value="3"> 減少投入</label><br>
<label><input type="radio" name="q5" value="4"> 改變策略</label>
</div>

<button type="button" onclick="calculateScore()">提交</button>

</form>

<div class="result" id="result"></div>

</div>

<script>
const form = document.getElementById('quizForm');
const progressBar = document.getElementById('progressBar');

form.addEventListener('change', () => {
    const total = 5;
    let answered = 0;
    for(let i=1;i<=total;i++){
        if(form['q'+i].value) answered++;
    }
    progressBar.style.width = (answered/total)*100 + '%';
});

function calculateScore(){
    let score = 0;
    for(let i=1;i<=5;i++){
        score += parseInt(form['q'+i].value || 0);
    }

    let resultText = "";

    if(score <= 10){
        resultText = "⚠️ 你可能正在強化『負向畢馬龍效應』：不自覺降低期待，導致表現停滯。";
    } else if(score <= 15){
        resultText = "🟡 你有基本支持，但多半維持現況，較少創造突破。";
    } else {
        resultText = "🟢 你具備高期待引導能力，正在塑造他人的成長軌跡。";
    }

    document.getElementById('result').innerHTML =
        "<h3>你的結果：</h3><p>" + resultText + "</p>";
}
</script>

</body>
</html>
