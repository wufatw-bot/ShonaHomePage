
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.hidden{display:none!important}
.screen{padding:2rem 1.5rem}
input{width:100%;margin-bottom:12px}
.btn{width:100%;padding:10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;cursor:pointer;transition:background 0.15s}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.btn-primary:hover{opacity:0.85}
.btn-sm{width:auto;padding:6px 12px;font-size:13px}
.btn-danger{border-color:var(--color-border-secondary);color:#A32D2D}
.err{color:#A32D2D;font-size:13px;margin-bottom:10px;padding:8px 12px;background:#FCEBEB;border-radius:var(--border-radius-md)}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.tag-admin{background:#EEEDFE;color:#3C3489}
.tag-user{background:#E1F5EE;color:#085041}
</style>

<h2 class="sr-only">Google Drive 檔案管理器，含密碼與使用者保護</h2>

<div id="login-screen" class="screen" style="max-width:380px;margin:2rem auto">
  <div style="text-align:center;margin-bottom:2rem">
    <i class="ti ti-folder-open" style="font-size:40px;color:var(--color-text-secondary)" aria-hidden="true"></i>
    <h2 style="font-size:20px;font-weight:500;margin-top:8px">Drive 檔案檢視器</h2>
    <p style="font-size:13px;color:var(--color-text-secondary);margin-top:4px">請登入以存取檔案</p>
  </div>
  <div id="login-err" class="err hidden"></div>
  <input type="text" id="login-user" placeholder="使用者名稱" />
  <input type="password" id="login-pass" placeholder="密碼" />
  <button class="btn btn-primary" onclick="doLogin()">登入</button>
  <p style="font-size:12px;color:var(--color-text-secondary);margin-top:12px;text-align:center">預設帳號：admin / admin123 ｜ user1 / user123</p>
</div>

<div id="main-screen" class="hidden">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:0.5px solid var(--color-border-tertiary)">
    <div style="display:flex;align-items:center;gap:10px">
      <i class="ti ti-folder-open" style="font-size:22px;color:var(--color-text-secondary)" aria-hidden="true"></i>
      <span style="font-weight:500;font-size:15px">Drive 檔案檢視器</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="user-badge" class="tag"></span>
      <span id="user-label" style="font-size:13px;color:var(--color-text-secondary)"></span>
      <button class="btn btn-sm" onclick="doLogout()"><i class="ti ti-logout" aria-hidden="true"></i> 登出</button>
    </div>
  </div>

  <div style="display:flex;height:calc(100vh - 60px);min-height:500px">
    <div id="sidebar" style="width:220px;border-right:0.5px solid var(--color-border-tertiary);padding:1rem;flex-shrink:0">
      <p style="font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">我的雲端硬碟</p>
      <div id="folder-list"></div>
      <div id="admin-panel" class="hidden" style="margin-top:1.5rem;border-top:0.5px solid var(--color-border-tertiary);padding-top:1rem">
        <p style="font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">管理員</p>
        <button class="btn btn-sm" style="width:100%;margin-bottom:6px" onclick="showPanel('users')"><i class="ti ti-users" aria-hidden="true"></i> 管理使用者</button>
        <button class="btn btn-sm" style="width:100%" onclick="showPanel('files')"><i class="ti ti-link" aria-hidden="true"></i> 管理檔案連結</button>
      </div>
    </div>

    <div style="flex:1;overflow:auto;padding:1.5rem">
      <div id="panel-files">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem">
          <h3 style="font-size:15px;font-weight:500" id="folder-title">所有檔案</h3>
          <input type="text" id="search" placeholder="搜尋檔案..." oninput="renderFiles()" style="width:200px;margin:0" />
        </div>
        <div id="file-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px"></div>
      </div>

      <div id="panel-users" class="hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem">
          <h3 style="font-size:15px;font-weight:500">管理使用者</h3>
          <button class="btn btn-sm btn-primary" onclick="showAddUser()"><i class="ti ti-plus" aria-hidden="true"></i> 新增使用者</button>
        </div>
        <div id="users-table"></div>
        <div id="add-user-form" class="hidden" style="margin-top:1rem;padding:1rem;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-secondary)">
          <p style="font-size:14px;font-weight:500;margin-bottom:12px">新增使用者</p>
          <input type="text" id="new-user" placeholder="使用者名稱" style="margin-bottom:8px" />
          <input type="password" id="new-pass" placeholder="密碼" style="margin-bottom:8px" />
          <select id="new-role" style="width:100%;margin-bottom:12px;padding:8px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px">
            <option value="user">一般使用者</option>
            <option value="admin">管理員</option>
          </select>
          <div style="display:flex;gap:8px">
            <button class="btn btn-sm btn-primary" onclick="addUser()">新增</button>
            <button class="btn btn-sm" onclick="document.getElementById('add-user-form').classList.add('hidden')">取消</button>
          </div>
        </div>
      </div>

      <div id="panel-filelinks" class="hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem">
          <h3 style="font-size:15px;font-weight:500">管理 Google Drive 檔案連結</h3>
          <button class="btn btn-sm btn-primary" onclick="showAddFile()"><i class="ti ti-plus" aria-hidden="true"></i> 新增檔案</button>
        </div>
        <div id="filelinks-table"></div>
        <div id="add-file-form" class="hidden" style="margin-top:1rem;padding:1rem;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-secondary)">
          <p style="font-size:14px;font-weight:500;margin-bottom:12px">新增 Google Drive 檔案</p>
          <input type="text" id="new-fname" placeholder="檔案名稱（例：Q1報告.xlsx）" style="margin-bottom:8px"/>
          <input type="text" id="new-fid" placeholder="Google Drive 檔案 ID（從分享連結取得）" style="margin-bottom:8px"/>
          <select id="new-ftype" style="width:100%;margin-bottom:8px;padding:8px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px">
            <option value="doc">Google 文件 (.doc)</option>
            <option value="sheet">Google 試算表 (.xlsx)</option>
            <option value="slide">Google 簡報 (.ppt)</option>
            <option value="pdf">PDF 檔案</option>
            <option value="other">其他</option>
          </select>
          <input type="text" id="new-ffolder" placeholder="資料夾（選填）" style="margin-bottom:12px"/>
          <div style="display:flex;gap:8px">
            <button class="btn btn-sm btn-primary" onclick="addFile()">新增</button>
            <button class="btn btn-sm" onclick="document.getElementById('add-file-form').classList.add('hidden')">取消</button>
          </div>
        </div>
        <div style="margin-top:1rem;padding:12px;background:#E6F1FB;border-radius:var(--border-radius-md)">
          <p style="font-size:13px;color:#0C447C"><i class="ti ti-info-circle" aria-hidden="true"></i> 如何取得 Google Drive 檔案 ID：開啟雲端硬碟 → 右鍵檔案 → 取得連結，連結中 <code>/d/</code> 和 <code>/view</code> 之間的部分即為 ID</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="preview-modal" class="hidden" style="position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100">
  <div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);width:90%;max-width:900px;height:85vh;display:flex;flex-direction:column;overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary)">
      <span id="preview-title" style="font-size:14px;font-weight:500"></span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" id="preview-dl"><i class="ti ti-download" aria-hidden="true"></i> 下載</button>
        <button class="btn btn-sm" id="preview-open"><i class="ti ti-external-link" aria-hidden="true"></i> 在 Drive 開啟</button>
        <button class="btn btn-sm btn-danger" onclick="closePreview()"><i class="ti ti-x" aria-hidden="true"></i></button>
      </div>
    </div>
    <iframe id="preview-frame" style="flex:1;border:none" src="" title="檔案預覽"></iframe>
  </div>
</div>

<script>
const USERS_KEY = 'gdv_users', FILES_KEY = 'gdv_files', SESSION_KEY = 'gdv_session';

const defaultUsers = [
  {username:'admin', password:'admin123', role:'admin'},
  {username:'user1', password:'user123', role:'user'}
];

const defaultFiles = [
  {id:'demo1', name:'年度報告 2024.docx', type:'doc', folder:'文件', driveId:'1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms'},
  {id:'demo2', name:'Q1 財務試算表.xlsx', type:'sheet', folder:'試算表', driveId:'1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms'},
  {id:'demo3', name:'產品簡報.pptx', type:'slide', folder:'簡報', driveId:'1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms'},
  {id:'demo4', name:'使用手冊.pdf', type:'pdf', folder:'文件', driveId:'1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms'}
];

let users = JSON.parse(localStorage.getItem(USERS_KEY) || 'null') || defaultUsers;
let files = JSON.parse(localStorage.getItem(FILES_KEY) || 'null') || defaultFiles;
let currentUser = JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null');
let activeFolder = null;

function saveUsers(){localStorage.setItem(USERS_KEY, JSON.stringify(users))}
function saveFiles(){localStorage.setItem(FILES_KEY, JSON.stringify(files))}

function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  const found=users.find(x=>x.username===u && x.password===p);
  if(!found){showLoginErr('使用者名稱或密碼錯誤');return}
  currentUser=found;
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(found));
  showMain();
}

function doLogout(){
  currentUser=null;
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('main-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
}

function showLoginErr(msg){
  const e=document.getElementById('login-err');
  e.textContent=msg;e.classList.remove('hidden');
}

function showMain(){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
  document.getElementById('login-err').classList.add('hidden');
  const badge=document.getElementById('user-badge');
  badge.textContent=currentUser.role==='admin'?'管理員':'使用者';
  badge.className='tag '+(currentUser.role==='admin'?'tag-admin':'tag-user');
  document.getElementById('user-label').textContent=currentUser.username;
  if(currentUser.role==='admin') document.getElementById('admin-panel').classList.remove('hidden');
  renderFolders();
  renderFiles();
}

function renderFolders(){
  const folders=[...new Set(files.map(f=>f.folder).filter(Boolean))];
  const fl=document.getElementById('folder-list');
  fl.innerHTML='';
  const allBtn=document.createElement('button');
  allBtn.className='btn btn-sm';allBtn.style.cssText='width:100%;text-align:left;margin-bottom:4px';
  allBtn.innerHTML='<i class="ti ti-files" aria-hidden="true"></i> 所有檔案';
  allBtn.onclick=()=>{activeFolder=null;document.getElementById('folder-title').textContent='所有檔案';renderFiles()};
  fl.appendChild(allBtn);
  folders.forEach(f=>{
    const b=document.createElement('button');
    b.className='btn btn-sm';b.style.cssText='width:100%;text-align:left;margin-bottom:4px';
    b.innerHTML=`<i class="ti ti-folder" aria-hidden="true"></i> ${f}`;
    b.onclick=()=>{activeFolder=f;document.getElementById('folder-title').textContent=f;renderFiles()};
    fl.appendChild(b);
  });
}

const typeIcon={doc:'ti-file-text',sheet:'ti-table',slide:'ti-presentation',pdf:'ti-file-type-pdf',other:'ti-file'};
const typeColor={doc:'c-blue',sheet:'c-green',slide:'c-amber',pdf:'c-coral',other:'c-gray'};
const typeLabel={doc:'Google 文件',sheet:'試算表',slide:'簡報',pdf:'PDF',other:'檔案'};

function renderFiles(){
  const q=document.getElementById('search').value.toLowerCase();
  const grid=document.getElementById('file-grid');
  let list=files;
  if(activeFolder) list=list.filter(f=>f.folder===activeFolder);
  if(q) list=list.filter(f=>f.name.toLowerCase().includes(q));
  grid.innerHTML='';
  if(!list.length){grid.innerHTML='<p style="color:var(--color-text-secondary);font-size:14px;grid-column:1/-1">找不到檔案</p>';return}
  list.forEach(f=>{
    const card=document.createElement('div');
    card.style.cssText='background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;cursor:pointer;transition:border-color 0.15s';
    card.onmouseenter=()=>card.style.borderColor='var(--color-border-primary)';
    card.onmouseleave=()=>card.style.borderColor='var(--color-border-tertiary)';
    const icon=typeIcon[f.type]||'ti-file';
    card.innerHTML=`
      <i class="ti ${icon}" style="font-size:28px;color:var(--color-text-secondary);display:block;margin-bottom:10px" aria-hidden="true"></i>
      <p style="font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px;word-break:break-word">${f.name}</p>
      <p style="font-size:11px;color:var(--color-text-secondary);margin-bottom:12px">${typeLabel[f.type]||'檔案'}</p>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" style="flex:1;font-size:12px" onclick="previewFile(event,'${f.id}')"><i class="ti ti-eye" aria-hidden="true"></i> 預覽</button>
        <button class="btn btn-sm" style="flex:1;font-size:12px" onclick="downloadFile(event,'${f.id}')"><i class="ti ti-download" aria-hidden="true"></i> 下載</button>
      </div>`;
    grid.appendChild(card);
  });
}

function getPreviewUrl(f){
  if(f.type==='doc') return `https://docs.google.com/document/d/${f.driveId}/preview`;
  if(f.type==='sheet') return `https://docs.google.com/spreadsheets/d/${f.driveId}/preview`;
  if(f.type==='slide') return `https://docs.google.com/presentation/d/${f.driveId}/preview`;
  if(f.type==='pdf') return `https://drive.google.com/file/d/${f.driveId}/preview`;
  return `https://drive.google.com/file/d/${f.driveId}/preview`;
}

function getDownloadUrl(f){
  if(f.type==='doc') return `https://docs.google.com/document/d/${f.driveId}/export?format=docx`;
  if(f.type==='sheet') return `https://docs.google.com/spreadsheets/d/${f.driveId}/export?format=xlsx`;
  if(f.type==='slide') return `https://docs.google.com/presentation/d/${f.driveId}/export/pptx`;
  return `https://drive.google.com/uc?id=${f.driveId}&export=download`;
}

function previewFile(e,id){
  e.stopPropagation();
  const f=files.find(x=>x.id===id);if(!f)return;
  document.getElementById('preview-title').textContent=f.name;
  document.getElementById('preview-frame').src=getPreviewUrl(f);
  const dlUrl=getDownloadUrl(f);
  document.getElementById('preview-dl').onclick=()=>window.open(dlUrl,'_blank');
  document.getElementById('preview-open').onclick=()=>window.open(`https://drive.google.com/file/d/${f.driveId}/view`,'_blank');
  document.getElementById('preview-modal').classList.remove('hidden');
}

function downloadFile(e,id){
  e.stopPropagation();
  const f=files.find(x=>x.id===id);if(!f)return;
  window.open(getDownloadUrl(f),'_blank');
}

function closePreview(){
  document.getElementById('preview-modal').classList.add('hidden');
  document.getElementById('preview-frame').src='';
}

function showPanel(name){
  ['files','users','filelinks'].forEach(p=>{
    document.getElementById('panel-'+p).classList.add('hidden');
    if(p==='filelinks') document.getElementById('panel-filelinks').classList.add('hidden');
  });
  document.getElementById('panel-files').classList.add('hidden');
  document.getElementById('panel-users').classList.add('hidden');
  document.getElementById('panel-filelinks').classList.add('hidden');
  if(name==='users'){document.getElementById('panel-users').classList.remove('hidden');renderUsersTable();}
  else if(name==='files'){document.getElementById('panel-filelinks').classList.remove('hidden');renderFilelinksTable();}
}

function renderUsersTable(){
  const t=document.getElementById('users-table');
  t.innerHTML='';
  const table=document.createElement('table');
  table.style.cssText='width:100%;border-collapse:collapse;font-size:13px';
  table.innerHTML=`<thead><tr style="border-bottom:0.5px solid var(--color-border-tertiary)">
    <th style="text-align:left;padding:8px 6px;color:var(--color-text-secondary);font-weight:500">使用者名稱</th>
    <th style="text-align:left;padding:8px 6px;color:var(--color-text-secondary);font-weight:500">角色</th>
    <th style="padding:8px 6px"></th></tr></thead>`;
  const tbody=document.createElement('tbody');
  users.forEach((u,i)=>{
    const tr=document.createElement('tr');
    tr.style.borderBottom='0.5px solid var(--color-border-tertiary)';
    tr.innerHTML=`<td style="padding:10px 6px;font-weight:500">${u.username}</td>
      <td style="padding:10px 6px"><span class="tag ${u.role==='admin'?'tag-admin':'tag-user'}">${u.role==='admin'?'管理員':'使用者'}</span></td>
      <td style="padding:10px 6px;text-align:right">
        ${u.username!=='admin'?`<button class="btn btn-sm btn-danger" onclick="deleteUser(${i})"><i class="ti ti-trash" aria-hidden="true"></i></button>`:''}
      </td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  t.appendChild(table);
}

function showAddUser(){document.getElementById('add-user-form').classList.remove('hidden')}

function addUser(){
  const u=document.getElementById('new-user').value.trim();
  const p=document.getElementById('new-pass').value;
  const r=document.getElementById('new-role').value;
  if(!u||!p){alert('請填寫使用者名稱和密碼');return}
  if(users.find(x=>x.username===u)){alert('使用者名稱已存在');return}
  users.push({username:u,password:p,role:r});
  saveUsers();
  document.getElementById('add-user-form').classList.add('hidden');
  document.getElementById('new-user').value='';document.getElementById('new-pass').value='';
  renderUsersTable();
}

function deleteUser(i){
  if(!confirm('確定刪除此使用者?'))return;
  users.splice(i,1);saveUsers();renderUsersTable();
}

function renderFilelinksTable(){
  const t=document.getElementById('filelinks-table');
  t.innerHTML='';
  const table=document.createElement('table');
  table.style.cssText='width:100%;border-collapse:collapse;font-size:13px';
  table.innerHTML=`<thead><tr style="border-bottom:0.5px solid var(--color-border-tertiary)">
    <th style="text-align:left;padding:8px 6px;color:var(--color-text-secondary);font-weight:500">名稱</th>
    <th style="text-align:left;padding:8px 6px;color:var(--color-text-secondary);font-weight:500">類型</th>
    <th style="text-align:left;padding:8px 6px;color:var(--color-text-secondary);font-weight:500">資料夾</th>
    <th style="padding:8px 6px"></th></tr></thead>`;
  const tbody=document.createElement('tbody');
  files.forEach((f,i)=>{
    const tr=document.createElement('tr');
    tr.style.borderBottom='0.5px solid var(--color-border-tertiary)';
    tr.innerHTML=`<td style="padding:10px 6px;font-weight:500">${f.name}</td>
      <td style="padding:10px 6px;color:var(--color-text-secondary)">${typeLabel[f.type]||'檔案'}</td>
      <td style="padding:10px 6px;color:var(--color-text-secondary)">${f.folder||'—'}</td>
      <td style="padding:10px 6px;text-align:right">
        <button class="btn btn-sm btn-danger" onclick="deleteFileLink(${i})"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  t.appendChild(table);
}

function showAddFile(){document.getElementById('add-file-form').classList.remove('hidden')}

function addFile(){
  const n=document.getElementById('new-fname').value.trim();
  const did=document.getElementById('new-fid').value.trim();
  const t=document.getElementById('new-ftype').value;
  const folder=document.getElementById('new-ffolder').value.trim();
  if(!n||!did){alert('請填寫名稱與 Drive ID');return}
  const id='f'+Date.now();
  files.push({id,name:n,type:t,folder:folder||null,driveId:did});
  saveFiles();
  document.getElementById('add-file-form').classList.add('hidden');
  document.getElementById('new-fname').value='';document.getElementById('new-fid').value='';document.getElementById('new-ffolder').value='';
  renderFilelinksTable();renderFolders();
}

function deleteFileLink(i){
  if(!confirm('確定刪除此檔案連結?'))return;
  files.splice(i,1);saveFiles();renderFilelinksTable();renderFolders();renderFiles();
}

document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

if(currentUser){showMain()}
</script>
