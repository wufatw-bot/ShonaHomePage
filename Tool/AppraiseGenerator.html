.checkbox-field input[type=checkbox]{width:18px;height:18px;cursor:pointer}
.checkbox-group{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px}
.checkbox-label{display:flex;align-items:center;gap:6px;padding:8px 14px;background:#f8f9fa;border:2px solid var(--border);border-radius:20px;cursor:pointer;transition:all .3s;font-weight:normal}

button.action-btn{padding:14px 28px;font-size:1rem;border-radius:8px;border:none;cursor:pointer;transition:all .3s;font-weight:600;flex:1;min-width:140px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.btn-copy{background:var(--primary);color:#fff}

.btn-share{background:#06c755;color:#fff}

.btn-reset{background:#f5f5f5;color:#666;flex:0 0 auto;min-width:100px}

.btn-refresh{background:var(--secondary);color:#fff;flex:0 0 auto;min-width:140px}

const tones = ['溫暖','幽默','感動','正經','活潑'];
let selectedTone = tones[Math.floor(Math.random() * tones.length)];
let currentAspects = [];
const formContent = document.getElementById('form-content');

function applyActiveTone() {
  document.querySelectorAll('.tone-btn').forEach(b => b.classList.toggle('active', b.dataset.tone === selectedTone));
}
applyActiveTone();

document.querySelectorAll('.tone-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedTone = btn.dataset.tone;
    document.getElementById('toneRandomBadge').textContent = '✏️ 已手動選擇';
    applyActiveTone();
    updateSummary();
  });
});

function getRandomAspects() {
  return [...allAspects].sort(() => Math.random() - .5).slice(0, 3);
}

function initForm() {
  formContent.innerHTML = '';
  currentAspects = getRandomAspects();
  document.getElementById('summaryText').innerHTML = '<span class="placeholder">請完成上方細節選擇，系統將自動為您生成溫暖的文字...</span>';

  currentAspects.forEach((asp, i) => {
    const div = document.createElement('div');
    div.className = 'dimension fade-in';
    div.style.animationDelay = `${i*.1}s`;
    div.innerHTML = `
      <div class="dimension-header">
        <span>題目 ${i+1}：${asp.name}</span>
        <span class="dimension-badge">未填寫</span>
      </div>
      <div class="dimension-body">
        <div class="aspect">
          <label class="aspect-label">${asp.name}</label>
          <span class="aspect-desc">${asp.desc}</span>
        </div>
      </div>`;

    const body = div.querySelector('.dimension-body .aspect');
    const sel = document.createElement('select');
    sel.id = asp.id; sel.dataset.name = asp.name;

    asp.options.forEach(opt => {
      const o = document.createElement('option');
      o.value = opt.val; o.textContent = opt.text;
      sel.appendChild(o);
    });

    sel.addEventListener('change', function() {
      const badge = div.querySelector('.dimension-badge');
      if (this.value) { this.classList.add('selected'); badge.textContent = '已填寫'; }
      else { this.classList.remove('selected'); badge.textContent = '未填寫'; }

      let otherC = this.parentElement.querySelector('.other-input-container');
      if (this.value === 'other') {
        if (!otherC) {
          otherC = document.createElement('div');
          otherC.className = 'other-input-container show';
          const inp = document.createElement('input');
          inp.type = 'text'; inp.placeholder = '請說明您的觀察...';
          inp.dataset.aspectId = asp.id;
          inp.addEventListener('input', updateSummary);
          otherC.appendChild(inp);
          this.parentElement.appendChild(otherC);
        } else otherC.classList.add('show');
      } else { if (otherC) otherC.classList.remove('show'); }

      updateStats();
      updateSummary();
    });

    body.appendChild(sel);
    formContent.appendChild(div);
  });
  updateStats();
}

// 基本資訊監聽
document.getElementById('studentName').addEventListener('input', updateSummary);
document.getElementById('hideMiddleName').addEventListener('change', updateSummary);
document.querySelectorAll('input[name="relation"]').forEach(cb => cb.addEventListener('change', updateSummary));
document.querySelectorAll('input[name="campus"]').forEach(r => r.addEventListener('change', updateSummary));

function updateStats() {
  const sels = document.querySelectorAll('select');
  const done = Array.from(sels).filter(s => s.value !== '').length;
  const total = sels.length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('completedCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function collectData() {
  const studentName = document.getElementById('studentName').value.trim();
  const hide = document.getElementById('hideMiddleName').checked;
  const relations = Array.from(document.querySelectorAll('input[name="relation"]:checked')).map(c => c.value);
  const campus = document.querySelector('input[name="campus"]:checked').value;

  let displayName = '孩子';
  if (studentName) {
    displayName = (hide && studentName.length >= 3)
      ? studentName[0] + '○' + studentName.slice(2)
      : studentName;
  }

  const role = relations.length === 0 ? '家長'
    : relations.length === 1 ? relations[0]
    : relations.length === 2 ? relations.join('和')
    : relations.slice(0,-1).join('、') + '和' + relations[relations.length-1];

  const selections = [];
  document.querySelectorAll('select').forEach(sel => {
    if (!sel.value) return;
    const otherInp = document.querySelector(`input[data-aspect-id="${sel.id}"]`);
    const customText = (sel.value === 'other' && otherInp && otherInp.value.trim()) ? otherInp.value.trim() : null;
    selections.push({ id: sel.id, val: sel.value, name: sel.dataset.name, customText });
  });

  return { displayName, role, campus, selections };
}

function updateSummary() {
  const { displayName, role, campus, selections } = collectData();
  const tone = selectedTone;
  const tmpl = templates[tone];

  if (selections.length === 0) {
    document.getElementById('summaryText').innerHTML = '<span class="placeholder">請完成上方細節選擇，系統將自動為您生成溫暖的文字...</span>';
    return;
  }

  // 開場白
  const opening = tmpl.openings[Math.floor(Math.random() * tmpl.openings.length)](displayName);

  // 內容句子
  const bodyParts = selections.map((s, idx) => {
    let phrase = '';
    if (s.val === 'other' && s.customText) {
      phrase = s.customText;
    } else {
      const phraseMap = itemPhrases[s.id];
      if (phraseMap && phraseMap[s.val] && phraseMap[s.val][tone]) {
        phrase = phraseMap[s.val][tone];
      } else {
        phrase = sel => `${s.name}方面有不錯的表現`;
      }
    }
    const connector = idx === 0 ? '' : tmpl.connectors[Math.floor(Math.random() * tmpl.connectors.length)];
    return (connector ? connector : '') + phrase;
  });

  // 結尾
  const closing = tmpl.closings[Math.floor(Math.random() * tmpl.closings.length)](campus);

  // 組合
  const text = `${opening}${bodyParts.join('，')}。${closing}`;
  document.getElementById('summaryText').textContent = text;
}

document.getElementById('copyBtn').addEventListener('click', async () => {
  const text = document.getElementById('summaryText').innerText;
  if (!text || text.includes('請完成')) { showToast('⚠️ 尚無可複製的內容'); return; }
  try { await navigator.clipboard.writeText(text); showToast('✅ 已複製到剪貼簿！'); }
  catch { showToast('❌ 複製失敗，請手動複製'); }
});

document.getElementById('shareBtn').addEventListener('click', () => {
  const text = document.getElementById('summaryText').innerText;
  if (!text || text.includes('請完成')) { showToast('⚠️ 尚無可分享的內容'); return; }
  window.open('https://line.me/R/msg/text/?' + encodeURIComponent(text), '_blank');
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  if (confirm('確定要換三題嗎？目前的選擇會清空。')) {
    selectedTone = tones[Math.floor(Math.random() * tones.length)];
    document.getElementById('toneRandomBadge').textContent = '🎲 隨機選出，可手動切換';
    applyActiveTone();
    initForm();
    showToast('🔄 已更換題目！');
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('確定要清空所有內容嗎？')) {
    document.querySelectorAll('select').forEach(s => { s.value = ''; s.classList.remove('selected'); });
    document.querySelectorAll('.other-input-container').forEach(c => c.classList.remove('show'));
    document.querySelectorAll('.dimension-badge').forEach(b => b.textContent = '未填寫');
    document.getElementById('summaryText').innerHTML = '<span class="placeholder">請完成上方細節選擇，系統將自動為您生成溫暖的文字...</span>';
    updateStats();
    showToast('🗑️ 已清空！');
  }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

initForm();
</script>
